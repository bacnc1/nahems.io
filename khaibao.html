<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khai báo sự cố - NA-HEMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Arial, sans-serif; }
        .card { border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); border: none; }
        .header-title { color: #0056b3; font-weight: 700; }
        .btn-tag { border: 1px solid #dee2e6; background: #fff; margin: 2px; font-size: 13px; transition: 0.3s; }
        .btn-tag:hover { background: #0056b3; color: #fff; }
        #reader { width: 100%; border-radius: 10px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="card p-4">
        <h2 class="header-title">KHAI BÁO SỰ CỐ THIẾT BỊ</h2>
        <p class="text-muted small">Vinh, Nghệ An - Ngày báo cáo: <span id="clock"></span></p>
        <hr>

        <form>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">📍 Khoa/Phòng yêu cầu (*):</label>
                    <select class="form-select" required>
                        <option value="">-- Chọn đơn vị --</option>
                        <optgroup label="Khối Phòng Ban">
                            <option>Tổ chức cán bộ</option> <option>Kế hoạch tổng hợp</option>
                            <option>Công nghệ thông tin</option> <option>Tài chính kế toán</option>
                            <option>Quản lý chất lượng</option> <option>Điều dưỡng</option>
                        </optgroup>
                        <optgroup label="Khối Lâm Sàng">
                            <option>Chấn thương</option> <option>Phụ Sản</option> <option>Gây mê hồi sức</option>
                            <option>Nội Tiêu hóa</option> <option>Cấp cứu</option> <option>Thăm dò chức năng</option>
                        </optgroup>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">👤 Người báo cáo:</label>
                    <input type="text" class="form-control bg-light" value="bacnc1" readonly>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-bold">📟 Quét QR / Nhập mã thiết bị:</label>
                    <div class="input-group">
                        <input type="text" id="deviceCode" class="form-control" placeholder="Quét QR để lấy mã thiết bị tự động...">
                        <button class="btn btn-primary" type="button" onclick="startScanner()">📷 Quét QR</button>
                    </div>
                    <div id="reader"></div>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-bold">🛠 Tình trạng chi tiết:</label>
                    <textarea class="form-control" id="desc" rows="3"></textarea>
                    <div class="mt-2">
                        <button type="button" class="btn btn-tag" onclick="addTag('Không lên nguồn')">Mất nguồn</button>
                        <button type="button" class="btn btn-tag" onclick="addTag('Màn hình sọc/đen')">Lỗi màn hình</button>
                        <button type="button" class="btn btn-tag" onclick="addTag('Kêu to')">Tiếng động lạ</button>
                    </div>
                </div>
            </div>

            <div class="mt-4 d-flex justify-content-end">
                <button type="submit" class="btn btn-success px-5">GỬI YÊU CẦU</button>
            </div>
        </form>
    </div>
</div>

<script>
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleString('vi-VN');
    }
    setInterval(updateClock, 1000);
    updateClock();

    function addTag(val) {
        document.getElementById('desc').value += (document.getElementById('desc').value ? ', ' : '') + val;
    }

    function startScanner() {
        const reader = document.getElementById('reader');
        reader.style.display = 'block';
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
        (text) => {
            document.getElementById('deviceCode').value = text;
            html5QrCode.stop();
            reader.style.display = 'none';
        });
    }
</script>
</body>
</html>
